<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════
     RÉPARTITION DES SERVICES ENSEIGNANTS — SEP
     Version  : 1.1
     Date     : 27 juin 2026
     Auteur   : Claude (Anthropic) — généré sur claude.ai
     Integration : JSON Configuration + Auto-load System
     ═══════════════════════════════════════════════════════════ -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Répartition des Services Enseignants – SEP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf3;
    --border: #c8d4e0;
    --accent: #1d6fa4;
    --accent2: #0f5a8a;
    --warn: #b45309;
    --danger: #c0392b;
    --ok: #1a7a4a;
    --text: #1e2d3d;
    --muted: #6b7f93;
    --header-bg: #e8ecf0;
    --row-alt: #f7fafd;
    --col-hover: rgba(29,111,164,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Calibri', 'Carlito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ─── LAYOUT ─── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .topbar h1 {
    font-family: 'Calibri', 'Carlito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .topbar .subtitle {
    font-size: 11px; color: var(--muted);
    font-family: 'Calibri', 'Carlito', sans-serif;
  }

  .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-family: 'Calibri', 'Carlito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #2563eb; }
  .btn.locked { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn.locked:hover { background: #a8332a; }
  .btn.success { background: var(--ok); border-color: var(--ok); color: #fff; }
  .btn.success:hover { background: #059669; }
  .btn.warn { background: var(--warn); border-color: var(--warn); color: #000; }

  .tabs {
    display: flex; gap: 2px;
    padding: 8px 18px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 16px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--accent2); background: var(--bg); border-color: var(--border); }
  .tab.tab-locked { color: var(--muted); cursor: not-allowed; opacity: 0.55; position: relative; }
  .tab.tab-locked::after { content: ' 🔒'; font-size: 10px; }
  .tab.tab-locked:hover { background: rgba(192,57,43,0.08); color: var(--danger); }

  .tab-content { display: none; flex: 1; overflow: auto; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* ─── MAIN TABLE TAB ─── */
  .table-wrapper { flex: 1; overflow: auto; position: relative; }

  table.repartition {
    border-collapse: collapse;
    font-size: 11.5px;
    font-family: 'Calibri', 'Carlito', sans-serif;
    width: max-content;
    min-width: 100%;
  }

  table.repartition thead { position: sticky; top: 0; z-index: 20; }

  /* ── ROW 1 : colonnes fixes (DIVISIONS, DISCIPLINE, horaires) ── gris clair */
  table.repartition th {
    background: #e8ecf0;
    color: #2c3e50;
    font-weight: 700;
    padding: 6px 8px;
    border: 1px solid #c0cad4;
    text-align: center;
    white-space: nowrap;
    font-size: 10.5px;
  }

  /* ── ROW 2 : bandeaux groupes d'enseignants ── orange clair */
  table.repartition th.disc-group {
    background: #fde8cc;
    color: #7a3b00;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border: 1px solid #5a6470;
    border-top: 2px solid #5a6470;
    border-bottom: 2px solid #5a6470;
  }

  /* ── ROW 4 : quotas ── bleu très clair */
  table.repartition th.quota {
    font-size: 10px;
    color: #1a4a70;
    background: #e8f4fd;
    border: 1px solid #5a6470;
    border-bottom: 2px solid #5a6470;
    font-weight: 700;
  }

  table.repartition td {
    border: 1px solid #999;
    border-bottom: 1.5px solid #5a6470;
    padding: 3px 7px;
    text-align: center;
    vertical-align: middle;
    min-width: 52px;
  }

  table.repartition td.val-cell {
    cursor: pointer;
    transition: background 0.1s;
    font-family: 'Calibri', 'Carlito', sans-serif;
  }
  table.repartition td.val-cell:hover { background: rgba(59,130,246,0.18) !important; outline: 1px solid var(--accent); }

  /* ─── ÉTAT VERROUILLÉ ─── */
  body.app-locked table.repartition td.val-cell { cursor: not-allowed; }
  body.app-locked table.repartition td.val-cell:hover { background: rgba(192,57,43,0.10) !important; outline: 1px dashed var(--danger); }
  table.repartition td.val-cell.has-val { color: #0d6efd; font-weight: 700; }
  table.repartition td.val-cell input {
    width: 100%; border: none; background: transparent; text-align: center;
    color: #0d6efd; font-weight: 700; font-family: 'Calibri', 'Carlito', sans-serif;
    font-size: 11.5px; outline: none; min-width: 40px;
  }

  .row-total { background: #d6e4f0 !important; color: var(--accent2) !important; font-weight: 700; }
  .row-hsa-ok    { color: var(--ok) !important; font-weight: 700; background: #eaf7f0 !important; }
  .row-hsa-warn  { color: var(--warn) !important; font-weight: 700; background: #fef6e8 !important; }
  .row-hsa-danger{ color: var(--danger) !important; font-weight: 700; background: #fde8e6 !important; }

  /* ══════════════════════════════════════════════════════════════
     COLONNES FIGÉES — volet fixe jusqu'à H/P inclus
     ══════════════════════════════════════════════════════════════ */
  table.repartition thead { position: sticky; top: 0; z-index: 40; }

  th.col-class {
    position: sticky; left: 0; z-index: 50;
    background: #e8ecf0; min-width: 82px; max-width: 82px;
    color: #2c3e50; border: 1px solid #c0cad4;
  }
  th.col-disc {
    position: sticky; left: 82px; z-index: 50;
    background: #e8ecf0; min-width: 260px;
    color: #2c3e50; border: 1px solid #c0cad4;
  }
  th.sticky-ctrl {
    position: sticky; left: 342px; z-index: 50;
    background: #dde3ea; min-width: 38px; max-width: 38px;
    color: #2c3e50; border: 1px solid #c0cad4;
  }

  td.col-class {
    background: #ffffff; color: var(--accent2); font-weight: 700; font-size: 11px;
    min-width: 82px; max-width: 82px; text-align: left;
    position: sticky; left: 0; z-index: 15;
  }
  td.col-disc {
    background: #ffffff; color: var(--text); min-width: 260px;
    text-align: left; position: sticky; left: 82px; z-index: 15; font-size: 11px;
  }

  .notice {
    padding: 10px 16px; border-radius: 6px; font-size: 12px;
    background: #e8f1fb; border: 1px solid #b8d4f0;
    color: var(--accent2); margin-bottom: 14px;
  }

  .settings-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .card h3 { font-size: 13px; font-weight: 600; color: var(--accent2); margin-bottom: 14px; }

  .field-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .field-row label { width: 120px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .field-row input, .field-row select {
    flex: 1;
    background: #f4f7fa;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'Calibri', 'Carlito', sans-serif;
  }

  .statusbar {
    display: flex; align-items: center; gap: 16px;
    padding: 5px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .statusbar .saved { color: var(--ok); }

  .loading-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .loading-box {
    background: #fff; padding: 40px; border-radius: 12px;
    text-align: center; min-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .loading-box h2 { color: var(--accent2); margin-bottom: 10px; }
  .loading-box p { color: var(--muted); margin-bottom: 20px; }
  .spinner {
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 40px; height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media print {
    .topbar, .tabs, .statusbar { display: none !important; }
    body { background: white; color: black; }
  }
</style>
</head>
<body>

<!-- ═══ ÉCRAN DE CHARGEMENT ═══ -->
<div id="loadingScreen" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <h2>⏳ Chargement...</h2>
    <p id="loadingStatus">Initialisation de l'application</p>
  </div>
</div>

<div id="app" style="display:none">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar h1" id="titleDisplay">RÉPARTITION SEP</div>
      <div class="subtitle">Gestion des services enseignants &nbsp;·&nbsp; <span id="appVersion">v1.1 — 27 juin 2026</span></div>
    </div>
    <div class="spacer"></div>
    <button class="btn" onclick="loadConfigAndData()" title="Recharger la configuration et les données">🔄 Recharger config</button>
    <button class="btn primary" onclick="saveData(true)" title="Télécharge un fichier .json contenant toutes les données">💾 Sauvegarder</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('table')">📊 Tableau</div>
    <div class="tab" onclick="showTab('synthese')">📈 Synthèse</div>
  </div>

  <!-- TAB: TABLE -->
  <div id="tab-table" class="tab-content active">
    <div class="table-wrapper" id="tableWrapper">
      <table class="repartition" id="mainTable"></table>
    </div>
  </div>

  <!-- TAB: SYNTHESE -->
  <div id="tab-synthese" class="tab-content">
    <div class="settings-panel">
      <div class="card">
        <h3>📈 Données chargées</h3>
        <div id="syntheseContent"></div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <span id="saveStatus" class="saved">✓ Données chargées</span>
    <span class="stat">📊 <span id="statTotal">0</span> lignes</span>
    <span class="stat">👤 <span id="statTeachers">0</span> enseignants</span>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--muted)">Config: <span id="configSource">-</span></span>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIGURATION LOADER & DATA MANAGER
// ════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'sep_repartition_v2';
const CONFIG_URL = '.github/config.json';
const DATA_URL = '_r_partition_sep_2026-06-25.json';

let appConfig = null;
let state = {};
let globalConfig = null;

// ─── 1. Charger la configuration depuis le fichier JSON
async function loadConfig() {
  try {
    const response = await fetch(CONFIG_URL);
    if (!response.ok) throw new Error('Config not found');
    globalConfig = await response.json();
    console.log('✓ Configuration chargée:', globalConfig);
    document.getElementById('configSource').textContent = CONFIG_URL;
    return globalConfig;
  } catch (e) {
    console.warn('⚠ Impossible de charger la config:', e.message);
    document.getElementById('configSource').textContent = 'par défaut';
    return null;
  }
}

// ─── 2. Charger les données depuis le fichier JSON
async function loadData() {
  try {
    const response = await fetch(DATA_URL);
    if (!response.ok) throw new Error('Data not found');
    const data = await response.json();
    console.log('✓ Données chargées:', data);
    return data;
  } catch (e) {
    console.error('✗ Erreur chargement données:', e.message);
    showLoading('Erreur: données non trouvées');
    return null;
  }
}

// ─── 3. Initialiser l'application
async function initializeApp() {
  try {
    updateLoading('Chargement de la configuration...');
    globalConfig = await loadConfig();

    updateLoading('Chargement des données...');
    const data = await loadData();

    if (!data) {
      showError('Impossible de charger les données');
      return;
    }

    // Initialiser l'état avec les données
    state = {
      title: data.title || 'RÉPARTITION SEP',
      year: data.year || '2024-2025',
      school: data.school || '',
      teachers: data.teachers || [],
      rows: data.rows || []
    };

    console.log('✓ Application initialisée');
    document.getElementById('titleDisplay').textContent = state.title;
    document.getElementById('statTeachers').textContent = state.teachers.length;
    document.getElementById('statTotal').textContent = state.rows.length;

    // Afficher la synthèse
    renderSynthese();

    // Masquer le loader et afficher l'app
    hideLoading();

  } catch (e) {
    console.error('✗ Erreur initialisation:', e);
    showError('Erreur lors de l\'initialisation');
  }
}

// ─── 4. Fonctions UI
function showLoading(message = 'Chargement...') {
  const screen = document.getElementById('loadingScreen');
  screen.style.display = 'flex';
  if (message) {
    document.getElementById('loadingStatus').textContent = message;
  }
}

function updateLoading(message) {
  document.getElementById('loadingStatus').textContent = message;
}

function hideLoading() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function showError(message) {
  document.getElementById('loadingStatus').textContent = '❌ ' + message;
  setTimeout(() => {
    hideLoading();
  }, 3000);
}

// ─── 5. Afficher la synthèse
function renderSynthese() {
  let html = '<div style="line-height: 1.8">';
  html += '<h4>📋 Résumé des données</h4>';
  html += '<p><strong>Titre:</strong> ' + (state.title || 'N/A') + '</p>';
  html += '<p><strong>Année:</strong> ' + (state.year || 'N/A') + '</p>';
  html += '<p><strong>Établissement:</strong> ' + (state.school || 'Non spécifié') + '</p>';
  html += '<hr style="margin: 15px 0; border: none; border-top: 1px solid var(--border)">';
  html += '<p><strong>👤 Enseignants:</strong> ' + (state.teachers?.length || 0) + '</p>';
  html += '<p><strong>📚 Disciplines:</strong> ' + (state.rows?.length || 0) + '</p>';
  
  if (state.teachers && state.teachers.length > 0) {
    html += '<hr style="margin: 15px 0; border: none; border-top: 1px solid var(--border)">';
    html += '<h4>Groupes d\'enseignants:</h4>';
    const groups = {};
    state.teachers.forEach(t => {
      if (!groups[t.group]) groups[t.group] = [];
      groups[t.group].push(t);
    });
    Object.entries(groups).forEach(([group, teachers]) => {
      html += '<p><strong>' + group + ':</strong> ' + teachers.length + ' enseignants</p>';
    });
  }

  html += '</div>';
  document.getElementById('syntheseContent').innerHTML = html;
}

// ─── 6. Autres fonctions nécessaires
function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tabName)?.classList.add('active');
  document.querySelector('.tab[onclick*="' + tabName + '"]')?.classList.add('active');
}

function saveData(download = false) {
  if (download) {
    const dataStr = JSON.stringify(state, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'sep_repartition_' + new Date().toISOString().split('T')[0] + '.json';
    link.click();
  }
}

function loadConfigAndData() {
  showLoading('Rechargement...');
  setTimeout(() => initializeApp(), 500);
}

// ────────────────────────────────────────────────────────────────
// DÉMARRAGE DE L'APPLICATION
// ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Démarrage de l\'application...');
  initializeApp();
});
</script>

</body>
</html>
